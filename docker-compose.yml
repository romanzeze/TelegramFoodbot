version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: foodbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      OPENAI_KEY: ${OPENAI_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: foodbot
      DB_USER: postgres
      DB_PASS: postgres
    restart: unless-stopped

volumes:
  postgres_data:
